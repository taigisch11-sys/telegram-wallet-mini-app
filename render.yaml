services:
  - type: web
    name: telegram-wallet-frontend
    runtime: static
    buildCommand: npm install && npm run build --workspace apps/frontend
    staticPublishPath: apps/frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: ALLOWALL
    envVars:
      - key: VITE_API_URL
        value: https://telegram-wallet-backend.onrender.com

  - type: web
    name: telegram-wallet-backend
    runtime: docker
    dockerfilePath: apps/backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_MODE
        value: webhook
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBAPP_URL
        value: https://telegram-wallet-frontend.onrender.com
      - key: TELEGRAM_WEBHOOK_URL
        value: https://telegram-wallet-backend.onrender.com/api/telegram/webhook
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://telegram-wallet-frontend.onrender.com
      - key: DEV_AUTH_BYPASS
        value: "false"
