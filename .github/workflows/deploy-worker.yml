name: Deploy API to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "apps/worker/**"
      - "packages/shared/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Worker
        run: npm run build --workspace @wallet/worker

      - name: Sync training Worker secrets
        if: ${{ secrets.TRAINING_TELEGRAM_BOT_TOKEN != '' && secrets.TRAINING_JWT_SECRET != '' && secrets.TRAINING_TELEGRAM_WEBHOOK_SECRET != '' }}
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TRAINING_TELEGRAM_BOT_TOKEN: ${{ secrets.TRAINING_TELEGRAM_BOT_TOKEN }}
          TRAINING_JWT_SECRET: ${{ secrets.TRAINING_JWT_SECRET }}
          TRAINING_TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TRAINING_TELEGRAM_WEBHOOK_SECRET }}
        run: |
          printf '%s' "$TRAINING_TELEGRAM_BOT_TOKEN" | npx wrangler secret put TRAINING_TELEGRAM_BOT_TOKEN
          printf '%s' "$TRAINING_JWT_SECRET" | npx wrangler secret put TRAINING_JWT_SECRET
          printf '%s' "$TRAINING_TELEGRAM_WEBHOOK_SECRET" | npx wrangler secret put TRAINING_TELEGRAM_WEBHOOK_SECRET

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy
