name: Deploy Santal Shift Mini App

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "apps/santal-shift/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-santal-shift.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      WORKER_URL: https://santal-shift-app.taigisch11.workers.dev/
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SANTAL_TELEGRAM_BOT_TOKEN: ${{ secrets.SANTAL_TELEGRAM_BOT_TOKEN }}
      SANTAL_TELEGRAM_WEBHOOK_SECRET: ${{ secrets.SANTAL_TELEGRAM_WEBHOOK_SECRET }}
      SANTAL_ADMIN_SETUP_TOKEN: ${{ secrets.SANTAL_ADMIN_SETUP_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.SANTAL_GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.SANTAL_GOOGLE_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test Santal Shift
        run: npm run test --workspace @santal/shift

      - name: Typecheck Santal Shift
        run: npm run build --workspace @santal/shift

      - name: Validate production secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SANTAL_TELEGRAM_BOT_TOKEN"
          test -n "$SANTAL_TELEGRAM_WEBHOOK_SECRET"
          test -n "$SANTAL_ADMIN_SETUP_TOKEN"

      - name: Deploy Worker shell
        working-directory: apps/santal-shift
        run: npx wrangler deploy

      - name: Upload Worker secrets
        working-directory: apps/santal-shift
        shell: bash
        run: |
          set -euo pipefail
          put_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              printf "%s" "$value" | npx wrangler secret put "$name"
            fi
          }
          put_secret "TELEGRAM_BOT_TOKEN" "$SANTAL_TELEGRAM_BOT_TOKEN"
          put_secret "TELEGRAM_WEBHOOK_SECRET" "$SANTAL_TELEGRAM_WEBHOOK_SECRET"
          put_secret "ADMIN_SETUP_TOKEN" "$SANTAL_ADMIN_SETUP_TOKEN"
          put_secret "GOOGLE_SERVICE_ACCOUNT_EMAIL" "$GOOGLE_SERVICE_ACCOUNT_EMAIL"
          put_secret "GOOGLE_PRIVATE_KEY" "$GOOGLE_PRIVATE_KEY"

      - name: Deploy Worker with secrets
        working-directory: apps/santal-shift
        run: npx wrangler deploy

      - name: Initialize Google Sheet structure
        if: github.event_name == 'workflow_dispatch' && env.GOOGLE_SERVICE_ACCOUNT_EMAIL != '' && env.GOOGLE_PRIVATE_KEY != '' && env.SANTAL_ADMIN_SETUP_TOKEN != ''
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${SANTAL_ADMIN_SETUP_TOKEN}" \
            "${WORKER_URL}api/admin/setup-sheet"

      - name: Configure Telegram bot
        if: env.SANTAL_TELEGRAM_BOT_TOKEN != ''
        run: |
          node <<'NODE'
          const token = process.env.SANTAL_TELEGRAM_BOT_TOKEN;
          const webAppUrl = process.env.WORKER_URL;
          const webhookSecret = process.env.SANTAL_TELEGRAM_WEBHOOK_SECRET || "";

          async function call(method, payload) {
            const response = await fetch(`https://api.telegram.org/bot${token}/${method}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (!response.ok || !result.ok) {
              throw new Error(`${method} failed: ${JSON.stringify(result)}`);
            }
          }

          await call("setMyName", { name: "Санталь Смена" });
          await call("setMyShortDescription", { short_description: "Подбор смен администраторов клиники" });
          await call("setMyDescription", {
            description: "Откройте Mini App, выберите филиал и дату, возьмите смену, подтвердите выход и отслеживайте начисления."
          });
          await call("setMyCommands", {
            commands: [
              { command: "start", description: "Открыть приложение" }
            ]
          });
          await call("setChatMenuButton", {
            menu_button: {
              type: "web_app",
              text: "Смены",
              web_app: { url: webAppUrl }
            }
          });
          await call("setWebhook", {
            url: `${webAppUrl}api/telegram/webhook`,
            secret_token: webhookSecret,
            drop_pending_updates: true
          });
          NODE

      - name: Check release readiness
        run: |
          curl --fail --silent --show-error "${WORKER_URL}api/release/readiness"
