name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /telegram-wallet-mini-app/
      VITE_API_URL: ${{ vars.VITE_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace @wallet/frontend

      - name: Build training frontend
        env:
          VITE_BASE_PATH: /telegram-wallet-mini-app/training/
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build --workspace @training/frontend

      - name: Add training app to Pages artifact
        run: |
          mkdir -p apps/frontend/dist/training
          cp -r apps/training/dist/* apps/frontend/dist/training/
          cp apps/training/dist/index.html apps/frontend/dist/training/404.html

      - name: Add SPA fallback
        run: cp apps/frontend/dist/index.html apps/frontend/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
